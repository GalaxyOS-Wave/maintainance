<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flodech Maintenance</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f3f3f5;
    font-family:Inter, Arial, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
    padding:20px;
}

.gears{
    margin-bottom:40px;
    position:relative;
    height:100px;
}

.gear-big{
    font-size:78px;
    color:#d1d5db;
    position:absolute;
    left:50%;
    transform:translateX(-50%);
}

.gear-small{
    font-size:48px;
    color:#fbbf24;
    position:absolute;
    left:55%;
    top:-5px;
}

h1{
    font-size:78px;
    font-weight:800;
    color:#374151;
    line-height:1.05;
    margin-bottom:18px;
    letter-spacing:-2px;
}

p{
    font-size:22px;
    color:#6b7280;
    margin-bottom:40px;
}

.actions{
    display:flex;
    justify-content:center;
    gap:16px;
}

.reload{
    text-decoration:none;
    color:#111827;
    border:2px solid #374151;
    padding:14px 28px;
    border-radius:4px;
    font-weight:600;
    transition:.2s;
}

.reload:hover{
    background:#e5e7eb;
}

@media(max-width:768px){

    h1{
        font-size:48px;
    }

    p{
        font-size:18px;
    }

    .actions{
        flex-direction:column;
        align-items:center;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="gears">
        <div class="gear-big">⚙</div>
        <div class="gear-small">⚙</div>
    </div>

    <h1>Flodech is under maintenance</h1>

    <p>
        We're making a few improvements and will be back shortly.
    </p>

    <div class="actions">
        <a href="javascript:location.reload()" class="reload">
            Reload
        </a>
    </div>

</div>

</body>
</html>
